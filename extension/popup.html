<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMap Review Decoder 설정</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(255, 255, 255, 0.05);
      --border-color: rgba(255, 255, 255, 0.1);
      --primary-color: #6366f1;
      --accent-color: #a855f7;
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      width: 320px;
      padding: 16px;
      background: var(--bg-gradient);
      color: var(--text-main);
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 14px;
    }

    .logo {
      font-size: 24px;
      filter: drop-shadow(0 0 6px rgba(99, 102, 241, 0.6));
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(90deg, #ffffff, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version {
      font-size: 11px;
      color: var(--text-sub);
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: #ffffff;
      font-size: 13px;
      outline: none;
      transition: all 0.2s ease;
    }

    select:focus, input[type="text"]:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
    }

    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #475569;
      transition: .3s;
      border-radius: 22px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
    }

    input:checked + .slider:before {
      transform: translateX(18px);
    }

    .status-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
    }

    .save-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }

    .save-btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .save-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔍</div>
    <div>
      <div class="title">GMap Review Decoder</div>
      <div class="version">구글 맵 문화권 리뷰 보정 v1.0.0</div>
    </div>
  </div>

  <div class="toggle-group">
    <span class="toggle-label">사이드바 오버레이 활성화</span>
    <label class="switch">
      <input type="checkbox" id="toggle-enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="form-group">
    <label for="select-culture">분석 대상 문화권</label>
    <select id="select-culture">
      <option value="Korean" selected>🇰🇷 한국인 (KR) - 기본값</option>
      <option value="Japanese">🇯🇵 일본인 (JP)</option>
      <option value="American">🇺🇸 미국인 (US)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="input-backend">FastAPI 백엔드 주소</label>
    <input type="text" id="input-backend" value="http://localhost:8000">
  </div>

  <div class="status-card">
    <span class="status-dot"></span>
    <span>UCSD Dataset Key (gmap_id) 감지 엔진 준비 완료</span>
  </div>

  <button class="save-btn" id="btn-save">설정 저장</button>

  <script src="popup.js"></script>
</body>
</html>
